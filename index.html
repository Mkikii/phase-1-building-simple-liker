<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Liker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Welcome to Simple Liker!</h1>
      <div class="posts">
        <div class="post">
          <p>This is the first post</p>
          <span class="like-glyph">♡</span>
        </div>
        <div class="post">
          <p>This is another post</p>
          <span class="like-glyph">♡</span>
        </div>
        <div class="post">
          <p>Yet another post</p>
          <span class="like-glyph">♡</span>
        </div>
      </div>
    </div>

    <!-- Error Modal -->
    <div id="modal" class="hidden">
      <div class="modal-content">
        <span id="modal-close">×</span>
        <p id="modal-message">Server Error</p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
